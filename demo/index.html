<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo · Finn 🦊</title>
  <meta name="description" content="Demo page coming soon." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #111; --border: #222; --text: #f5f5f5;
      --muted: #888; --accent: #ff6b35;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; line-height: 1.6; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .container { max-width: 860px; margin: 0 auto; padding: 0 1.5rem; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; text-align: center; }
    h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 1rem; }
    p { font-size: 1.1rem; color: var(--muted); margin-bottom: 2rem; }
    .btn { display: inline-block; padding: 0.75rem 1.5rem; background: var(--accent); color: #fff; border-radius: 8px; font-weight: 600; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.9; text-decoration: none; }
  </style>
</head>
<body>
<div class="container">
  <h1>Coming Soon 🚀</h1>
  <p>The demo page is under construction. Head back to explore Finn's capabilities.</p>
  <a href="/" class="btn">← Back to Home</a>
</div>
</body>
</html>
